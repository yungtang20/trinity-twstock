<!doctype html>
<html lang="zh-TW">
  <head>
    <script>
      (function() {
        try {
          var originalFetch = window.fetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(val) { console.warn("Ignoring write to window.fetch"); },
              configurable: true,
              enumerable: true
            });
          } catch (err1) {
            try {
              Object.defineProperty(Window.prototype, 'fetch', {
                get: function() { return originalFetch; },
                set: function(val) { console.warn("Ignoring write to Window.prototype.fetch"); },
                configurable: true,
                enumerable: true
              });
            } catch (err2) {
              if (typeof globalThis !== 'undefined') {
                Object.defineProperty(globalThis, 'fetch', {
                  get: function() { return originalFetch; },
                  set: function(val) { console.warn("Ignoring write to globalThis.fetch"); },
                  configurable: true,
                  enumerable: true
                });
              }
            }
          }
        } catch (e) {
          console.error("fetch polyfill safety patch failed:", e);
        }
      })();
    </script>
