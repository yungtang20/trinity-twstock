[tool.ruff]
target-version = "py310"
line-length = 100

# 第三方／外部關聯專案（保留但不掃描）：twse-app 前端、TWSEMCPServer-main MCP Server、
# vibecoding-linear-framework-main、superpowers_*。這些皆非 twstock 本體，也不污染 ruff/pyright/pytest。
extend-exclude = [
    "TWSEMCPServer-main",
    "twse-app",
    "vibecoding-linear-framework-main",
    "superpowers_zh",
    "superpowers_repo",
]

[tool.ruff.lint]
select = [
    "E",   # pycodestyle errors
    "F",   # pyflakes
    "W",   # pycodestyle warnings
    "I",   # isort
]
ignore = [
    "E501",  # line too long (handled manually)
    "E701",  # multiple statements on one line (colon) — common in this codebase
    "E402",  # module level import not at top — required for sys.path manipulation
    "E702",  # multiple statements on one line (semicolon) — rare, stylistic
]

[tool.ruff.lint.per-file-ignores]
"scripts/*" = ["E402", "E701"]
"tests/*" = ["F401", "F841"]  # unused imports/variables useful for test exploration

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
warn_unused_ignores = false
check_untyped_defs = true

[[tool.mypy.overrides]]
module = "model.*"
ignore_errors = true

[tool.black]
line-length = 100
target-version = ['py310']
